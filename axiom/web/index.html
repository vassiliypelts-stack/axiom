      api("/api/warmup/settings").then(s=>{const a=box.querySelector("#warm-auto"),i=box.querySelector("#warm-int"),m=box.querySelector("#warm-camix");
        if(a)a.checked=!!s.auto;if(i)i.value=s.interval_h||24;if(m)m.checked=!!s.ca_mix;
        if(s.last_run)box.querySelector("#warm-set-msg").textContent="последний авто-прогрев: "+s.last_run;});
      const ss=box.querySelector("#warm-set-save");if(ss)ss.onclick=async()=>{
        await api("/api/warmup/settings",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({auto:box.querySelector("#warm-auto").checked,interval_h:+box.querySelector("#warm-int").value,ca_mix:box.querySelector("#warm-camix").checked})});
        box.querySelector("#warm-set-msg").textContent="сохранено";};
      const gb=box.querySelector(`#warm-go-${id}`);if(gb)gb.onclick=async()=>{gb.disabled=true;gb.textContent="запускаю…";
        const r=await api(`/api/campaign/${id}/warmup`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({})});
        gb.disabled=false;gb.textContent="🔥 Запустить ступень прогрева";
        const m=box.querySelector("#warm-msg");
        if(r.error){m.innerHTML='<span style="color:#c0392b">'+esc(r.error)+'</span>';}
        else{m.textContent=`прогрев запущен (${r.warming} акк.) — идёт в фоне, ступень обновится через несколько минут`;}};
    };
    render();
  });
  mount.querySelectorAll(".cl-go").forEach(b=>b.onclick=async()=>{
    const id=b.dataset.id,n=document.getElementById("cl-"+id).value||3;
    if(!confirm(`Отправить первое сообщение ${n} контактам?\nЭто РЕАЛЬНАЯ отправка живым людям с аккаунта.`))return;
    b.textContent="…";
    const send=async(force)=>api(`/api/campaign/${id}/launch`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({limit:+n,force})});
    let r=await send(false);
    if(r.needs_confirm){
      if(!confirm("⚠️ "+r.warn)){b.textContent="▶ Запустить";return;}
      r=await send(true);
    }
    if(r.error){alert(r.error);b.textContent="▶ Запустить";return;}
    alert(`Запущено: до ${r.launched} контактов. Отправка идёт в фоне с паузами.\n\n⚠️ Если придёт уведомление про флуд-лимит — аккаунту нужен прогрев и медленнее темп. Следи в колокольчике 🔔 и «Прогресс».`);
    setTimeout(route,2000);
  });
  mount.querySelectorAll(".cl-del").forEach(b=>b.onclick=async()=>{
    if(!confirm("Удалить кампанию?"))return;
    await api(`/api/campaign/${b.dataset.id}/delete`,{method:"POST"});route();});
}

let CHAT_SEL=null;
let CHATS_ALL=[];
async function viewChats(v){
  CHATS_ALL=await api("/api/chats");
  const accs=[...new Map(CHATS_ALL.filter(c=>c.account_id).map(c=>[c.account_id,c.account_label||("#"+c.account_id)])).entries()];
  v.innerHTML=`<div class="chat-toolbar" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
      <input id="ch-q" placeholder="🔍 поиск: имя / @ник / текст" style="flex:1;min-width:180px">
      <select id="ch-status">
        <option value="">все статусы</option>
        <option value="replied">💬 ответившие</option>
        <option value="in_dialog">в диалоге</option>
        <option value="messaged">написано, ждём</option>
        <option value="meeting_set">встреча</option>
        <option value="won">сделка</option>
        <option value="nurture">прогрев</option>
        <option value="lost">потеряны</option>
      </select>
      <select id="ch-acc"><option value="">любой аккаунт</option>${accs.map(([id,lbl])=>`<option value="${id}">${esc(lbl)}</option>`).join("")}</select>
      <select id="ch-sort"><option value="recent">свежие сверху</option><option value="unread">сначала ответившие</option><option value="msgs">больше сообщений</option></select>
      <span class="hint" id="ch-cnt"></span>
    </div>
    <div class="chat-wrap">
      <div class="chat-list" id="clist"></div>
      <div class="thread" id="thread"><div class="empty" style="margin:auto">Выбери диалог слева</div></div>
    </div>`;
  const drawList=()=>{
    const q=($("#ch-q").value||"").toLowerCase().trim();
    const st=$("#ch-status").value, acc=$("#ch-acc").value, sort=$("#ch-sort").value;
    let rows=CHATS_ALL.slice();
    if(st==="replied")rows=rows.filter(c=>(c.in_cnt||0)>0);
    else if(st)rows=rows.filter(c=>c.status===st);
    if(acc)rows=rows.filter(c=>String(c.account_id)===acc);
    if(q)rows=rows.filter(c=>((c.name||"")+" "+(c.username||"")+" "+(c.last_text||"")).toLowerCase().includes(q));
    if(sort==="unread")rows.sort((a,b)=>(b.in_cnt||0)-(a.in_cnt||0)||(b.last_ts>a.last_ts?1:-1));
    else if(sort==="msgs")rows.sort((a,b)=>(b.msg_count||0)-(a.msg_count||0));
    // recent — уже по last_ts с бэка
    $("#ch-cnt").textContent=`${rows.length} из ${CHATS_ALL.length}`;
    $("#clist").innerHTML=rows.length?rows.map(c=>{
      const replied=(c.in_cnt||0)>0;
      const waiting=c.last_dir==="in";   // последнее слово за клиентом — ждёт нашего ответа
      return `<div class="chat-item${c.id===CHAT_SEL?" sel":""}" data-id="${c.id}">
        <div class="nm">${esc(c.name)||(c.username?"@"+esc(c.username):"#"+c.id)}
          ${waiting?'<span class="badge b-active" style="font-size:10px">ждёт ответа</span>':(replied?'<span class="badge b-nurture" style="font-size:10px">ответил</span>':"")}</div>
        <div class="pv">${c.last_dir==="out"?"→ ":""}${esc(c.last_text)||""}</div>
        <div class="pv" style="opacity:.6;font-size:11px">${c.account_label?("📱 "+esc(c.account_label)+" · "):""}${statusBadge(c.status)}</div></div>`;
    }).join(""):'<div class="empty">Ничего не найдено</div>';
    $("#clist").querySelectorAll(".chat-item").forEach(it=>it.onclick=()=>{CHAT_SEL=+it.dataset.id;
      $("#clist").querySelectorAll(".chat-item").forEach(x=>x.classList.remove("sel"));it.classList.add("sel");openThread(CHAT_SEL);});
  };
  ["ch-q","ch-status","ch-acc","ch-sort"].forEach(id=>{const el=$("#"+id);el.oninput=drawList;el.onchange=drawList;});
  drawList();
}

let NAV_COLLAPSE={};try{NAV_COLLAPSE=JSON.parse(localStorage.getItem("axiom_nav_collapse")||"{}");}catch(e){}
let NAV_ORDER=null;try{NAV_ORDER=JSON.parse(localStorage.getItem("axiom_nav_order")||"null");}catch(e){}
let NAV_GORDER=null;try{NAV_GORDER=JSON.parse(localStorage.getItem("axiom_nav_gorder")||"null");}catch(e){}
function navApplyOrder(){
  // порядок разделов (групп) целиком — тянем заголовок вверх/вниз
  if(NAV_GORDER)NAV_GROUPS.sort((a,b)=>{const ia=NAV_GORDER.indexOf(a.title||"_"),ib=NAV_GORDER.indexOf(b.title||"_");
    return (ia<0?99:ia)-(ib<0?99:ib);});
  // порядок подпунктов внутри раздела
  if(NAV_ORDER)NAV_GROUPS.forEach(g=>{const ord=NAV_ORDER[g.title||"_"];if(!ord)return;
    g.items.sort((a,b)=>{const ia=ord.indexOf(a.id),ib=ord.indexOf(b.id);return (ia<0?99:ia)-(ib<0?99:ib);});});
}
function renderNav(active){
  navApplyOrder();
  $("#nav").innerHTML=NAV_GROUPS.map(g=>{
    const col=g.collapsible&&NAV_COLLAPSE[g.title];
    const hdr=g.title?`<div class="navhdr${g.collapsible?' clk':''}${col?' col':''}" draggable="true" title="потяни ⠿, чтобы поменять порядок разделов" data-g="${g.title}" style="padding:10px 13px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:700;display:flex;justify-content:space-between;align-items:center;cursor:pointer"><span style="display:flex;align-items:center;gap:6px;min-width:0"><span class="ghandle">⠿</span>${g.title}</span>${g.collapsible?`<span class="chev">▾</span>`:""}</div>`:"";
    const items=col?"":g.items.map(n=>`<a draggable="true" data-id="${n.id}" data-g="${g.title||'_'}" class="${n.id===active?"active":""}"><span class="ic">${n.ic}</span>${n.label}${n.cnt!=null?`<span class="cnt">${n.cnt}</span>`:""}</a>`).join("");
    return hdr+items;
  }).join("");
  $("#nav").querySelectorAll("a").forEach(a=>a.onclick=()=>{location.hash=a.dataset.id;});
  let dragG=null;
  $("#nav").querySelectorAll(".navhdr[data-g]").forEach(h=>{
    h.onclick=()=>{if(!NAV_GROUPS.find(g=>g.title===h.dataset.g&&g.collapsible))return;
      NAV_COLLAPSE[h.dataset.g]=!NAV_COLLAPSE[h.dataset.g];localStorage.setItem("axiom_nav_collapse",JSON.stringify(NAV_COLLAPSE));renderNav(active);};
    h.ondragstart=e=>{dragG=h.dataset.g;h.style.opacity=".4";e.stopPropagation();};
    h.ondragend=()=>{h.style.opacity="1";dragG=null;$("#nav").querySelectorAll(".navhdr").forEach(x=>x.classList.remove("drop-hi"));};
    h.ondragover=e=>{if(dragG&&dragG!==h.dataset.g){e.preventDefault();h.classList.add("drop-hi");}};
    h.ondragleave=()=>h.classList.remove("drop-hi");
    h.ondrop=e=>{h.classList.remove("drop-hi");if(!dragG||dragG===h.dataset.g)return;e.preventDefault();
      const order=NAV_GROUPS.map(g=>g.title||"_");
      const from=order.indexOf(dragG),to=order.indexOf(h.dataset.g);
      const [m]=order.splice(from,1);order.splice(to,0,m);
      NAV_GORDER=order;localStorage.setItem("axiom_nav_gorder",JSON.stringify(order));renderNav(active);};
  });
  let drag=null;
  $("#nav").querySelectorAll("a[draggable]").forEach(a=>{
    a.ondragstart=()=>{drag=a;a.style.opacity=".4";};
    a.ondragend=()=>{a.style.opacity="1";drag=null;};
    a.ondragover=e=>e.preventDefault();
    a.ondrop=e=>{e.preventDefault();if(!drag||drag===a||drag.dataset.g!==a.dataset.g)return;
      const g=NAV_GROUPS.find(x=>(x.title||"_")===a.dataset.g);if(!g)return;
      const from=g.items.findIndex(i=>i.id===drag.dataset.id),to=g.items.findIndex(i=>i.id===a.dataset.id);
      const [m]=g.items.splice(from,1);g.items.splice(to,0,m);
      NAV_ORDER=NAV_ORDER||{};NAV_ORDER[a.dataset.g]=g.items.map(i=>i.id);
      localStorage.setItem("axiom_nav_order",JSON.stringify(NAV_ORDER));renderNav(active);};
  });
}

// ----------------------------------------------------------------- notifications
let NOTIF=[];
function notifSeenTs(){return localStorage.getItem("axiom_notif_seen")||"";}
async function refreshNotif(){
  try{const r=await api("/api/notifications");NOTIF=r.items||[];}catch(e){NOTIF=[];}
  const seen=notifSeenTs();
  const unseen=NOTIF.filter(n=>(n.type==="msg"||n.type==="event")&&(n.ts||"")>seen).length;
  const b=$("#bell-badge");
  if(unseen>0){b.textContent=unseen>99?"99+":unseen;b.style.display="";}else b.style.display="none";
}
const EVENT_IC={campaign_start:"▶",campaign_done:"✅",lead:"🔥",meeting:"📅",ban:"⛔",warm_ready:"🌡",info:"ℹ️"};
function renderNotif(){
  const box=$("#notif");
  if(!NOTIF.length){box.innerHTML='<div class="empty" style="padding:24px">Пока пусто</div>';return;}
  box.innerHTML=NOTIF.map(n=>{
    if(n.type==="event"){
      const ic=EVENT_IC[n.event_type]||"•";
      const col=n.level==="warn"?"#c0392b":(n.level==="good"?"var(--green)":"var(--muted)");
      const nav=n.contact_id?`data-cid="${n.contact_id}"`:(n.campaign_id?`data-camp="${n.campaign_id}"`:"");
      return `<div class="ni" ${nav}>
        <span class="ic">${ic}</span>
        <div class="tx"><div class="who" style="color:${col}">${esc(n.title||"")}</div>
          ${n.text?`<div class="msg">${esc(n.text)}</div>`:""}</div>
        <span class="tm">${fmt(n.ts)}</span></div>`;
    }
    return `<div class="ni" data-cid="${n.contact_id}">
      <span class="ic">${n.type==="meeting"?"📅":"💬"}</span>
      <div class="tx"><div class="who">${esc(n.who||"—")}</div>
        <div class="msg">${n.type==="meeting"?"назначена встреча":esc(n.text)}</div></div>
      <span class="tm">${fmt(n.ts)}</span></div>`;}).join("");
  box.querySelectorAll(".ni").forEach(el=>el.onclick=()=>{$("#notif").style.display="none";
    if(el.dataset.cid)openDossier(+el.dataset.cid);
    else if(el.dataset.camp){location.hash="campaigns";}});
}
$("#bell").onclick=()=>{const box=$("#notif");const open=box.style.display==="none";
  if(open){renderNotif();box.style.display="block";
    if(NOTIF.length)localStorage.setItem("axiom_notif_seen",NOTIF.reduce((a,n)=>n.ts>a?n.ts:a,""));
    $("#bell-badge").style.display="none";
  }else box.style.display="none";};
document.addEventListener("click",e=>{if(!e.target.closest(".bellwrap"))$("#notif").style.display="none";});

async function route(){
  const id=(location.hash||"#dashboard").slice(1);
  const nav=NAV.find(n=>n.id===id)||NAV[0];
  renderNav(nav.id);$("#title").textContent=nav.label;
  const v=$("#view");v.innerHTML='<div class="sub">Загрузка…</div>';
  try{await (VIEWS[nav.id]||viewDashboard)(v);}catch(e){v.innerHTML=`<div class="empty">Ошибка: ${esc(e.message)}</div>`;}
  $("#upd").textContent="обновлено "+new Date().toLocaleTimeString("ru-RU");
  refreshNotif();
}
window.addEventListener("hashchange",route);
$("#refresh").onclick=route;
route();
setInterval(refreshNotif,60000);
</script>
</body>
</html>
