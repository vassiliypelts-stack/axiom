<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIOM — пульт</title>
<style>
  :root{
    --bg:#F3F1EA; --panel:#FFFFFF; --panel2:#F7F5EE; --border:#E7E2D6;
    --text:#1C1B17; --muted:#8A8475; --accent:#C2860F; --accent-soft:#F7EBCF;
    --ink:#1C1B17; --green:#1E9E5A; --green-soft:#E4F4EA;
    --blue:#2563D6; --red:#D14B43; --purple:#7A5AF0; --radius:14px;
    --shadow:0 1px 2px rgba(28,24,12,.05), 0 8px 24px rgba(28,24,12,.06);
    --shadow-sm:0 1px 2px rgba(28,24,12,.06);
  }
  *{box-sizing:border-box;}
  body{margin:0;color:var(--text);-webkit-font-smoothing:antialiased;
    background:var(--bg);
    background-image:radial-gradient(120% 80% at 85% -10%, #FBF6EA 0%, rgba(251,246,234,0) 55%),
                     radial-gradient(90% 70% at 0% 0%, #F7F4EC 0%, rgba(247,244,236,0) 50%);
    font:14px/1.55 "Segoe UI",-apple-system,system-ui,Roboto,Helvetica,Arial,sans-serif;}
  .app{display:flex;min-height:100vh;}

  /* ---- Sidebar ---- */
  .side{width:236px;flex:0 0 236px;background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .side .brand{padding:22px 22px 18px;border-bottom:1px solid var(--border);}
  .side .brand h1{margin:0;font-size:23px;font-weight:800;letter-spacing:.32em;color:var(--ink);}
  .side .brand .ac{color:var(--accent);}
  .side .brand small{display:block;color:var(--muted);font-size:10px;letter-spacing:.22em;text-transform:uppercase;margin-top:4px;}
  nav{padding:12px 12px;flex:1;}
  nav a{display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:10px;color:#5E594D;
    text-decoration:none;font-size:14px;font-weight:500;margin-bottom:2px;cursor:pointer;
    transition:background .12s,color .12s;position:relative;}
  nav a:hover{background:var(--panel2);color:var(--text);}
  nav a.active{background:var(--accent-soft);color:#7A530A;font-weight:600;}
  nav a.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--accent);}
  nav a .ic{width:20px;text-align:center;font-size:16px;filter:grayscale(.2);}
  nav a .cnt{margin-left:auto;background:var(--panel2);border:1px solid var(--border);border-radius:20px;
    font-size:11px;padding:1px 8px;color:var(--muted);}
  .side .foot{padding:14px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:7px;
    box-shadow:0 0 0 3px var(--green-soft);}

  /* ---- Content ---- */
  .content{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 30px;
    border-bottom:1px solid var(--border);background:rgba(255,255,255,.78);backdrop-filter:blur(10px);position:sticky;top:0;z-index:4;}
  .topbar h2{margin:0;font-size:19px;font-weight:700;letter-spacing:-.01em;}
  .topbar .right{display:flex;align-items:center;gap:12px;}
  .upd{color:var(--muted);font-size:12px;}
  main{padding:26px 30px;flex:1;max-width:1320px;width:100%;}

  button,.btn{background:var(--panel);color:var(--text);border:1px solid var(--border);
    padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;
    box-shadow:var(--shadow-sm);transition:border-color .12s,background .12s,color .12s;}
  button:hover,.btn:hover{border-color:#CFC7B5;background:var(--panel2);}
  button.primary{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:600;}
  button.primary:hover{background:#34322B;border-color:#34322B;color:#fff;}
  button:disabled{opacity:.55;cursor:default;}
  input,select,textarea{background:var(--panel);color:var(--text);border:1px solid var(--border);
    padding:8px 11px;border-radius:9px;font-size:13px;outline:none;font-family:inherit;transition:border-color .12s,box-shadow .12s;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  textarea{resize:vertical;width:100%;line-height:1.5;}

  /* ---- Cards / stats ---- */
  .funnel{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:14px;margin-bottom:20px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
  .card .num{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .card .lbl{color:var(--muted);font-size:12px;margin-top:7px;font-weight:500;}
  .card::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);}
  .card.k-new::after{background:var(--blue);}
  .card.k-messaged::after,.card.k-in_dialog::after{background:var(--accent);}
  .card.k-meeting_set::after,.card.k-met::after,.card.k-won::after{background:var(--green);}
  .card.k-lost::after,.card.k-stop::after{background:var(--red);}
  .strip{display:flex;gap:12px;margin-bottom:26px;flex-wrap:wrap;}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:11px 17px;box-shadow:var(--shadow-sm);}
  .stat b{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;} .stat span{color:var(--muted);font-size:12px;margin-left:6px;}

  /* ---- Smart table ---- */
  .ttoolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  .ttoolbar .grow{flex:1;}
  .ttoolbar .hint{color:var(--muted);font-size:12px;}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
  th,td{text-align:left;padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;white-space:nowrap;background:var(--panel2);}
  th:hover{color:var(--text);}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:#FBFAF5;}
  tbody tr.clk{cursor:pointer;}
  .grouphdr td{background:var(--accent-soft);color:#7A530A;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;}
  .name{font-weight:600;}
  .sub{color:var(--muted);font-size:12px;}
  .mono{font-variant-numeric:tabular-nums;}
  .tg{color:var(--blue);} .no{color:#B6B0A0;}

  .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid;white-space:nowrap;background:var(--panel);}
  .b-new{color:var(--blue);border-color:#BBD0F4;background:#EEF4FE;}
  .b-messaged,.b-in_dialog{color:#9A6A07;border-color:#EAD6A6;background:var(--accent-soft);}
  .b-meeting_set,.b-met,.b-won{color:#157A43;border-color:#B7E2C7;background:var(--green-soft);}
  .b-lost,.b-stop{color:var(--red);border-color:#EDC3C0;background:#FBEEED;}
  .b-nurture{color:var(--muted);border-color:var(--border);background:var(--panel2);}
  .b-active{color:#157A43;border-color:#B7E2C7;background:var(--green-soft);}

  .tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
  .tag{background:var(--accent-soft);color:#8A5E08;border:1px solid #EAD6A6;border-radius:7px;padding:1px 8px;font-size:11px;display:inline-flex;gap:5px;align-items:center;}
  .tag x{cursor:pointer;color:#B89A55;font-style:normal;}
  .tag x:hover{color:var(--red);}
  .tag-add{cursor:pointer;color:var(--muted);border:1px dashed var(--border);border-radius:7px;padding:0 8px;font-size:12px;}
  .tag-add:hover{color:var(--accent);border-color:var(--accent);}

  /* ---- Kanban ---- */
  .kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;}
  .kcol{flex:0 0 230px;background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;max-height:72vh;}
  .kcol h3{margin:0;padding:12px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-weight:700;}
  .kcol h3 .n{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:0 8px;color:var(--text);}
  .kbody{padding:10px;overflow-y:auto;flex:1;min-height:60px;}
  .kbody.over{background:var(--accent-soft);outline:1px dashed var(--accent);outline-offset:-4px;}
  .kcard{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:9px;cursor:grab;box-shadow:var(--shadow-sm);transition:border-color .12s,box-shadow .12s;}
  .kcard:hover{border-color:var(--accent);box-shadow:var(--shadow);}
  .kcard .nm{font-weight:600;font-size:13px;}
  .kcard .mt{color:var(--muted);font-size:11px;margin-top:3px;}

  /* ---- Chats ---- */
  .chat-wrap{display:flex;gap:16px;height:74vh;}
  .chat-list{flex:0 0 310px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow-y:auto;box-shadow:var(--shadow);}
  .chat-item{padding:13px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
  .chat-item:hover,.chat-item.sel{background:var(--panel2);}
  .chat-item.sel{box-shadow:inset 3px 0 0 var(--accent);}
  .chat-item .nm{font-weight:600;}
  .chat-item .pv{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .thread{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;box-shadow:var(--shadow);}
  .thread .th-hd{padding:15px 17px;border-bottom:1px solid var(--border);font-weight:600;}
  .th-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:9px;background:var(--panel2);}
  .bubble{max-width:70%;padding:10px 14px;border-radius:16px;font-size:13px;white-space:pre-wrap;box-shadow:var(--shadow-sm);}
  .bubble.in{background:var(--panel);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:5px;}
  .bubble.out{background:#FBEFD2;border:1px solid #EAD6A6;align-self:flex-end;border-bottom-right-radius:5px;}
  .bubble .t{font-size:10px;color:var(--muted);margin-top:5px;}

  /* ---- Detail drawer (досье) ---- */
  .drawer{position:fixed;top:0;right:0;width:430px;max-width:92vw;height:100vh;background:var(--panel);
    border-left:1px solid var(--border);box-shadow:-18px 0 50px rgba(28,24,12,.14);z-index:20;
    transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
  .drawer.open{transform:translateX(0);}
  .drawer .dh{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;border-bottom:1px solid var(--border);}
  .drawer .dh b{font-size:16px;}
  .drawer .db{padding:22px;overflow-y:auto;flex:1;}
  .field{margin-bottom:15px;} .field label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;font-weight:600;}
  .field .v{font-size:14px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
  a.ext{color:var(--blue);text-decoration:none;font-weight:500;} a.ext:hover{text-decoration:underline;}
  .empty{text-align:center;color:var(--muted);padding:50px;}
  .stub{text-align:center;color:var(--muted);padding:60px 20px;}
  .stub .big{font-size:40px;margin-bottom:14px;}
  hr{border:none;border-top:1px solid var(--border);margin:18px 0;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#DBD5C7;border-radius:6px;border:2px solid var(--bg);}
  ::-webkit-scrollbar-thumb:hover{background:#C9C2B0;}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><h1>AX<span class="ac">I</span>OM</h1><small>пульт оператора</small></div>
    <nav id="nav"></nav>
    <div class="foot"><span class="dot"></span>@iivairf · онлайн</div>
  </aside>
  <div class="content">
    <div class="topbar">
      <h2 id="title">Дашборд</h2>
      <div class="right"><span class="upd" id="upd">—</span><button id="refresh">⟳ Обновить</button></div>
    </div>
    <main id="view"></main>
  </div>
</div>
<div class="drawer" id="drawer"><div class="dh"><b id="dr-title">Досье</b><button id="dr-close">✕</button></div><div class="db" id="dr-body"></div></div>

<script>
// ----------------------------------------------------------------- helpers
const STATUS_RU={new:"Новый",messaged:"Написано",in_dialog:"В диалоге",meeting_set:"Встреча",met:"Встреча прошла",won:"Сделка",lost:"Потерян",nurture:"Прогрев",stop:"Стоп"};
const STAGES=["new","messaged","in_dialog","meeting_set","met","won","nurture","lost","stop"];
const $=s=>document.querySelector(s);
const api=(u,o)=>fetch(u,o).then(r=>r.json());
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function fmt(ts){if(!ts)return"";const d=new Date(ts.replace(" ","T")+"Z");return isNaN(d)?ts:d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});}
function statusBadge(s){return `<span class="badge b-${s}">${STATUS_RU[s]||s}</span>`;}
function chCell(c){if(c.username)return `<span class="tg">@${esc(c.username)}</span>`;if(c.phone)return `<span class="sub mono">${esc(c.phone)}</span>`;return '<span class="no">—</span>';}

const NAV=[
  {id:"dashboard",ic:"📊",label:"Дашборд"},
  {id:"projects",ic:"📁",label:"Проекты"},
  {id:"agents",ic:"🤖",label:"Команда"},
  {id:"calendar",ic:"📅",label:"Календарь"},
  {id:"crm",ic:"📇",label:"CRM · База + Лиды"},
  {id:"dossier",ic:"🗂️",label:"Досье на людей"},
  {id:"campaigns",ic:"🎯",label:"Кампании"},
  {id:"parser",ic:"🛰️",label:"Парсинг TG"},
  {id:"proxy",ic:"🛡️",label:"Прокси"},
  {id:"chats",ic:"💬",label:"Чаты"},
];
let STATE={contacts:[],stats:null};
let PROJECT_SEL=null; // выбранный проект (фильтрует кампании)

// ----------------------------------------------------------------- smart table
// cfg: {columns:[{key,label,render?,cls?}], rows, searchKeys, groupOptions:[{key,label}], onRowClick, tagsCfg}
function smartTable(mount,cfg){
  const st={q:"",group:"",sortKey:null,sortDir:1};
  const wrap=document.createElement("div");
  const groupOpts=`<option value="">без группировки</option>`+(cfg.groupOptions||[]).map(g=>`<option value="${g.key}">группа: ${g.label}</option>`).join("");
  wrap.innerHTML=`<div class="ttoolbar">
      <input class="grow" id="st-q" placeholder="🔍 фильтр по таблице…">
      ${cfg.groupOptions?`<select id="st-g">${groupOpts}</select>`:""}
      <span class="hint" id="st-cnt"></span>
    </div><div id="st-tbl"></div>`;
  mount.appendChild(wrap);
  const draw=()=>{
    let rows=cfg.rows.slice();
    if(st.q){const q=st.q.toLowerCase();rows=rows.filter(r=>(cfg.searchKeys||Object.keys(r)).some(k=>String(r[k]??"").toLowerCase().includes(q)));}
    if(st.sortKey)rows.sort((a,b)=>{const x=a[st.sortKey]??"",y=b[st.sortKey]??"";return (x>y?1:x<y?-1:0)*st.sortDir;});
    wrap.querySelector("#st-cnt").textContent=`${rows.length} из ${cfg.rows.length}`;
    const head=`<tr>${cfg.columns.map(c=>`<th data-k="${c.key}">${c.label}${st.sortKey===c.key?(st.sortDir>0?" ▲":" ▼"):""}</th>`).join("")}</tr>`;
    const cell=(r,c)=>`<td class="${c.cls||""}">${c.render?c.render(r):esc(r[c.key])}</td>`;
    const rowHtml=r=>`<tr class="${cfg.onRowClick?"clk":""}" data-id="${r.id}">${cfg.columns.map(c=>cell(r,c)).join("")}</tr>`;
    let body="";
    if(st.group){
      const groups={};rows.forEach(r=>{const g=r[st.group]||"—";(groups[g]=groups[g]||[]).push(r);});
      Object.keys(groups).sort().forEach(g=>{
        const label=cfg.groupFmt?cfg.groupFmt(st.group,g):g;
        body+=`<tr class="grouphdr"><td colspan="${cfg.columns.length}">${label} · ${groups[g].length}</td></tr>`;
        body+=groups[g].map(rowHtml).join("");
      });
    } else body=rows.map(rowHtml).join("");
    if(!rows.length)body=`<tr><td colspan="${cfg.columns.length}" class="empty">${cfg.emptyText||"Ничего не найдено"}</td></tr>`;
    wrap.querySelector("#st-tbl").innerHTML=`<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
    wrap.querySelectorAll("th").forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(st.sortKey===k)st.sortDir*=-1;else{st.sortKey=k;st.sortDir=1;}draw();});
    if(cfg.onRowClick)wrap.querySelectorAll("tbody tr.clk").forEach(tr=>tr.onclick=e=>{if(e.target.closest(".tag,.tag-add,.tag x"))return;cfg.onRowClick(+tr.dataset.id);});
    bindTags(wrap);
  };
  wrap.querySelector("#st-q").oninput=e=>{st.q=e.target.value;draw();};
  if(cfg.groupOptions)wrap.querySelector("#st-g").onchange=e=>{st.group=e.target.value;draw();};
  draw();
}
function tagsCell(r){
  const chips=(r.tags||[]).map(t=>`<span class="tag">${esc(t)} <x data-id="${r.id}" data-t="${esc(t)}">✕</x></span>`).join("");
  return `<span class="tags">${chips}<span class="tag-add" data-id="${r.id}">+ тег</span></span>`;
}
function bindTags(scope){
  scope.querySelectorAll(".tag-add").forEach(b=>b.onclick=async e=>{e.stopPropagation();
    const id=+b.dataset.id,t=prompt("Новый тег:");if(!t)return;
    const c=STATE.contacts.find(x=>x.id===id);const tags=[...(c.tags||[]),t.trim()];
    await api(`/api/contact/${id}/tags`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tags})});
    c.tags=tags;route();});
  scope.querySelectorAll(".tag x").forEach(x=>x.onclick=async e=>{e.stopPropagation();
    const id=+x.dataset.id,t=x.dataset.t;const c=STATE.contacts.find(v=>v.id===id);
    const tags=(c.tags||[]).filter(v=>v!==t);
    await api(`/api/contact/${id}/tags`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tags})});
    c.tags=tags;route();});
}

// ----------------------------------------------------------------- views
async function viewDashboard(v){
  const s=STATE.stats=await api("/api/stats");
  v.innerHTML=`<div class="funnel">${s.funnel.map(f=>`<div class="card k-${f.key}"><div class="num">${f.count}</div><div class="lbl">${f.label}</div></div>`).join("")}</div>
   <div class="strip">
     <div class="stat"><b>${s.total}</b><span>контактов</span></div>
     <div class="stat"><b>${s.messages.out}</b><span>исходящих</span></div>
     <div class="stat"><b>${s.messages.in}</b><span>входящих</span></div>
     <div class="stat"><b>${s.meetings}</b><span>встреч</span></div>
     <div class="stat"><b>${s.agents}</b><span>агентов активно</span></div>
   </div>`;
}

const ROLE_RU={sdr:"SDR — первый контакт",qualifier:"Квалификатор",closer:"Переговорщик",scheduler:"Ассистент встреч","":"—"};
const ACC_ST={active:"активен",warming:"прогрев",paused:"пауза",banned:"бан"};
async function viewAgents(v){
  const a=await api("/api/accounts");
  v.innerHTML=`<p class="sub" style="margin-top:0">Твои рабочие аккаунты (пул отправителей) — «кто есть кто». С каждого бот пишет в рамках дневного лимита.</p>
    <div class="card" style="margin-bottom:16px">
      <div class="ttoolbar" style="margin:0">
        <input id="a-label" placeholder="Ярлык (напр. Вася SDR)">
        <input id="a-phone" placeholder="+7..." style="max-width:150px">
        <input id="a-user" placeholder="@username" style="max-width:150px">
        <select id="a-role"><option value="sdr">SDR</option><option value="qualifier">Квалификатор</option><option value="closer">Переговорщик</option><option value="scheduler">Ассистент встреч</option></select>
        <select id="a-status"><option value="warming">прогрев</option><option value="active">активен</option><option value="paused">пауза</option><option value="banned">бан</option></select>
        <input id="a-limit" type="number" value="15" title="лимит/день" style="max-width:90px">
        <button class="primary" id="a-add">➕ Добавить аккаунт</button>
      </div></div>
    <div class="ttoolbar" style="margin:0 0 12px"><button id="a-health">🛡 Проверить аккаунты (@SpamBot)</button>
      <span class="hint">аккаунты сами спросят @SpamBot про ограничения — статус появится в колонке «Подключение» через ~минуту (обнови)</span></div>
    <div id="acc-tbl"></div>`;

function renderCrmKanban(mount,readonly,pipeline){
  pipeline=pipeline||(PIPELINES&&PIPELINES.find(p=>p.id===PIPELINE_SEL))||null;
  const stages=(pipeline&&pipeline.stages&&pipeline.stages.length)?pipeline.stages:STAGES.map(k=>({key:k,label:STATUS_RU[k]||k}));
  const isDef=pipeline?!!pipeline.is_default:true, pid=pipeline?pipeline.id:null;
  const rows=STATE.contacts.filter(c=> pid==null ? true : (c.pipeline_id===pid||(c.pipeline_id==null&&isDef)));
  const by={};stages.forEach(s=>by[s.key]=[]);
  rows.forEach(c=>{const k=by[c.status]?c.status:(stages[0]&&stages[0].key);if(by[k])by[k].push(c);});
  const kan=document.createElement("div");kan.className="kanban";
  kan.innerHTML=stages.map(s=>`<div class="kcol"><h3>${esc(s.label)}<span class="n">${(by[s.key]||[]).length}</span></h3>
    <div class="kbody" data-s="${s.key}">${(by[s.key]||[]).map(c=>`<div class="kcard" draggable="${!readonly}" data-id="${c.id}">
      <div class="nm">${esc(c.name)||"без имени"}</div><div class="mt">${esc(c.agency||c.city||"")}${c.username?" · @"+esc(c.username):""}</div></div>`).join("")}</div></div>`).join("");
  mount.appendChild(kan);
  kan.querySelectorAll(".kcard").forEach(card=>card.onclick=()=>openDossier(+card.dataset.id));
  if(readonly)return;
  let drag=null;
  kan.querySelectorAll(".kcard").forEach(card=>{
    card.ondragstart=()=>{drag=+card.dataset.id;card.style.opacity=".4";};
    card.ondragend=()=>{card.style.opacity="1";};
  });
  kan.querySelectorAll(".kbody").forEach(col=>{
    col.ondragover=e=>{e.preventDefault();col.classList.add("over");};
    col.ondragleave=()=>col.classList.remove("over");
    col.ondrop=async e=>{e.preventDefault();col.classList.remove("over");
      const s=col.dataset.s;if(drag==null)return;
      await api(`/api/contact/${drag}/move`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({stage:s})});
      const c=STATE.contacts.find(x=>x.id===drag);if(c)c.status=s;drag=null;route();};
  });
}

          <button class="primary cl-go" data-id="${c.id}">▶ Запустить</button>
          <button class="cl-del" data-id="${c.id}">✕</button>
        </div></div>
        <div class="cprog" id="prog-${c.id}" style="margin-top:12px"></div></div>`;
  }).join("");
  mount.querySelectorAll(".cl-edit").forEach(b=>b.onclick=()=>window.__campEdit(+b.dataset.id));
  mount.querySelectorAll(".cl-prog").forEach(b=>b.onclick=async()=>{
    const id=b.dataset.id,box=document.getElementById("prog-"+id);
    if(box.dataset.open==="1"){box.innerHTML="";box.dataset.open="";return;}
    box.dataset.open="1";box.innerHTML='<div class="sub">загружаю…</div>';
    const p=await api(`/api/campaign/${id}/progress`);
    if(p.error){box.innerHTML=`<div class="empty">${esc(p.error)}</div>`;return;}
    if(!p.rows.length){box.innerHTML='<div class="sub">Аудитория пуста — некому слать (проверь тег/канал/статусы).</div>';return;}
    const rowsHtml=p.rows.map(r=>`<tr>
      <td style="text-align:center">${r.sent?'<span style="color:var(--green);font-weight:700">✓</span>':'<span class="no">○</span>'}</td>
      <td>${esc(r.name)||("#"+r.id)}</td>
      <td class="mono">${esc(r.handle)}</td>
      <td>${esc(r.account)}</td>
      <td class="sub">${r.sent?fmt(r.sent_at):"в очереди"}</td></tr>`).join("");
    box.innerHTML=`<div class="sub" style="margin-bottom:6px">Отправлено <b>${p.sent_count}</b> из ${p.total} · аккаунт: <b>${esc(p.account_name)}</b></div>

        <table style="width:100%;border-collapse:collapse">
          <tr><th style="width:34px">✓</th><th>Кому</th><th>Контакт</th><th>С аккаунта</th><th>Когда</th></tr>
          ${rowsHtml}</table></div>`;
  });
  mount.querySelectorAll(".cl-go").forEach(b=>b.onclick=async()=>{
    const id=b.dataset.id,n=document.getElementById("cl-"+id).value||3;
    if(!confirm(`Отправить первое сообщение ${n} контактам?\nЭто РЕАЛЬНАЯ отправка живым людям с аккаунта.`))return;
    b.textContent="…";
    const r=await api(`/api/campaign/${id}/launch`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({limit:+n})});
    if(r.error){alert(r.error);b.textContent="▶ Запустить";return;}
    alert(`Запущено: до ${r.launched} контактов. Отправка идёт в фоне с паузами — следи в разделах Чаты и CRM, прогресс подтянется.`);
    setTimeout(route,2000);
  });
  mount.querySelectorAll(".cl-del").forEach(b=>b.onclick=async()=>{
    if(!confirm("Удалить кампанию?"))return;
    await api(`/api/campaign/${b.dataset.id}/delete`,{method:"POST"});route();});
}

    <div class="row2">
      <div class="field"><label>Цель: @чат / ссылка / поисковый запрос</label><input id="p-target" placeholder="напр.: недвижимость сочи   или   @somechat"></div>

        <option value="all">админы + активные</option>
        <option value="members">участники группы</option>
      </select></div>
    </div>

      <div class="field"><label>Глубина scan (для «активных»)</label><input id="p-scan" type="number" value="2000"></div>

    </div>
    <label style="display:flex;gap:8px;align-items:center;margin:8px 0"><input type="checkbox" id="p-save"> записать найденных в книжку (без галочки — только показать)</label>
    <button id="p-run">Запустить</button>
    <pre id="p-out" style="${POUT}display:none"></pre>
  </div>
  <div class="card" style="margin-bottom:16px">
    <b style="font-size:14px">🔗 Инвайты закрытых групп</b>
    <div class="sub" style="margin:6px 0 12px">Соберёт ссылки t.me/+… из сообщений и покажет, что за группой (название, участники) — без вступления. Вступаешь вручную, потом парсишь.</div>
    <div class="row2">
      <div class="field"><label>Сканировать чат (@/ссылка)</label><input id="i-target" placeholder="@chat — необязательно"></div>
      <div class="field"><label>&nbsp;</label><label style="display:flex;gap:8px;align-items:center;height:38px"><input type="checkbox" id="i-dialogs"> по всем моим группам</label></div>
    </div>
    <button id="i-run">Собрать инвайты</button>
    <pre id="i-out" style="${POUT}display:none"></pre>
  </div>
  <div class="card" style="background:var(--panel2)">
    <b style="font-size:13px">👂 Слушатель по ключам</b>
    <div class="sub" style="margin:6px 0">Мониторинг чатов в реальном времени работает как фоновый процесс (long-running), поэтому запускается из консоли:</div>
    <pre style="${POUT}margin-top:6px">python -m channels.tg_listener --keywords "ищу риелтора, куплю квартиру в сочи, нужен ипотечный"</pre>
  </div>`;

  const run=async(btn,outSel,url,body)=>{
    const out=$(outSel);const t=btn.textContent;btn.disabled=true;btn.textContent="выполняю… (до минуты)";
    out.style.display="block";out.textContent="⏳ подключаюсь к Telegram и собираю…";

        <td>${esc(x.name)||("#"+x.cid)}</td>
        <td class="mono">${x.username?"@"+esc(x.username):(esc(x.phone)||"—")}</td>
        <td>${x.zoom_link?`<a class="ext" href="${esc(x.zoom_link)}" target="_blank">ссылка ↗</a>`:'<span class="no">—</span>'}</td>
        <td class="sub">${esc(x.notes)||""}</td></tr>`).join("")}
    </table></div>`;
}

// ----------------------------------------------------------------- router
const VIEWS={dashboard:viewDashboard,projects:viewProjects,agents:viewAgents,calendar:viewCalendar,crm:viewCrm,dossier:viewDossier,campaigns:viewCampaigns,parser:viewParser,proxy:viewProxy,chats:viewChats};

const NAV_ORDER_KEY="axiom_nav_order";
function applyNavOrder(){
  try{
    const saved=JSON.parse(localStorage.getItem(NAV_ORDER_KEY)||"[]");
    if(saved.length)NAV.sort((a,b)=>{const ia=saved.indexOf(a.id),ib=saved.indexOf(b.id);return (ia<0?999:ia)-(ib<0?999:ib);});
  }catch(e){}
}
function saveNavOrder(){try{localStorage.setItem(NAV_ORDER_KEY,JSON.stringify(NAV.map(n=>n.id)));}catch(e){}}
function renderNav(active){
  $("#nav").innerHTML=NAV.map(n=>`<a draggable="true" data-id="${n.id}" class="${n.id===active?"active":""}">
    <span class="ic">${n.ic}</span>${n.label}${n.cnt!=null?`<span class="cnt">${n.cnt}</span>`:""}</a>`).join("");
  $("#nav").querySelectorAll("a").forEach(a=>{
    a.onclick=()=>{location.hash=a.dataset.id;};
    a.ondragstart=e=>{e.dataTransfer.setData("id",a.dataset.id);a.style.opacity=".4";};
    a.ondragend=()=>{a.style.opacity="";};
    a.ondragover=e=>{e.preventDefault();a.style.borderTop="2px solid var(--accent)";};
    a.ondragleave=()=>{a.style.borderTop="";};
    a.ondrop=e=>{e.preventDefault();a.style.borderTop="";
      const from=e.dataTransfer.getData("id"),to=a.dataset.id;
      if(!from||from===to)return;
      const fi=NAV.findIndex(n=>n.id===from),ti=NAV.findIndex(n=>n.id===to);
      if(fi<0||ti<0)return;
      const [mv]=NAV.splice(fi,1);NAV.splice(ti,0,mv);
      saveNavOrder();renderNav(active);
    };
  });
}
async function route(){
  const id=(location.hash||"#dashboard").slice(1);
  const nav=NAV.find(n=>n.id===id)||NAV[0];
  renderNav(nav.id);$("#title").textContent=nav.label;
  const v=$("#view");v.innerHTML='<div class="sub">Загрузка…</div>';
  try{await (VIEWS[nav.id]||viewDashboard)(v);}catch(e){v.innerHTML=`<div class="empty">Ошибка: ${esc(e.message)}</div>`;}
  $("#upd").textContent="обновлено "+new Date().toLocaleTimeString("ru-RU");
}
window.addEventListener("hashchange",route);
$("#refresh").onclick=route;
applyNavOrder();
route();
</script>
