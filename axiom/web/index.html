<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIOM — пульт</title>
<style>
  :root{
    --bg:#F3F1EA; --panel:#FFFFFF; --panel2:#F7F5EE; --border:#E7E2D6;
    --text:#1C1B17; --muted:#8A8475; --accent:#C2860F; --accent-soft:#F7EBCF;
    --ink:#1C1B17; --green:#1E9E5A; --green-soft:#E4F4EA;
    --blue:#2563D6; --red:#D14B43; --purple:#7A5AF0; --radius:14px;
    --shadow:0 1px 2px rgba(28,24,12,.05), 0 8px 24px rgba(28,24,12,.06);
    --shadow-sm:0 1px 2px rgba(28,24,12,.06);
  }
  *{box-sizing:border-box;}
  body{margin:0;color:var(--text);-webkit-font-smoothing:antialiased;
    background:var(--bg);
    background-image:radial-gradient(120% 80% at 85% -10%, #FBF6EA 0%, rgba(251,246,234,0) 55%),
                     radial-gradient(90% 70% at 0% 0%, #F7F4EC 0%, rgba(247,244,236,0) 50%);
    font:14px/1.55 "Segoe UI",-apple-system,system-ui,Roboto,Helvetica,Arial,sans-serif;}
  .app{display:flex;min-height:100vh;}

  /* ---- Sidebar ---- */
  .side{width:236px;flex:0 0 236px;background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .side .brand{padding:22px 22px 18px;border-bottom:1px solid var(--border);}
  .side .brand h1{margin:0;font-size:23px;font-weight:800;letter-spacing:.32em;color:var(--ink);}
  .side .brand .ac{color:var(--accent);}
  .side .brand small{display:block;color:var(--muted);font-size:10px;letter-spacing:.22em;text-transform:uppercase;margin-top:4px;}
  nav{padding:12px 12px;flex:1;}
  nav a{display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:10px;color:#5E594D;
    text-decoration:none;font-size:14px;font-weight:500;margin-bottom:2px;cursor:pointer;
    transition:background .12s,color .12s;position:relative;}
  nav a:hover{background:var(--panel2);color:var(--text);}
  nav a.active{background:var(--accent-soft);color:#7A530A;font-weight:600;}
  nav a.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--accent);}
  nav a .ic{width:20px;text-align:center;font-size:16px;filter:grayscale(.2);}
  nav a .cnt{margin-left:auto;background:var(--panel2);border:1px solid var(--border);border-radius:20px;
    font-size:11px;padding:1px 8px;color:var(--muted);}
  .side .foot{padding:14px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:7px;
    box-shadow:0 0 0 3px var(--green-soft);}

  /* ---- Content ---- */
  .content{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 30px;
    border-bottom:1px solid var(--border);background:rgba(255,255,255,.78);backdrop-filter:blur(10px);position:sticky;top:0;z-index:4;}
  .topbar h2{margin:0;font-size:19px;font-weight:700;letter-spacing:-.01em;}
  .topbar .right{display:flex;align-items:center;gap:12px;}
  .upd{color:var(--muted);font-size:12px;}
  main{padding:26px 30px;flex:1;max-width:1320px;width:100%;}

  button,.btn{background:var(--panel);color:var(--text);border:1px solid var(--border);
    padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;
    box-shadow:var(--shadow-sm);transition:border-color .12s,background .12s,color .12s;}
  button:hover,.btn:hover{border-color:#CFC7B5;background:var(--panel2);}
  button.primary{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:600;}
  button.primary:hover{background:#34322B;border-color:#34322B;color:#fff;}
  button:disabled{opacity:.55;cursor:default;}
  input,select,textarea{background:var(--panel);color:var(--text);border:1px solid var(--border);
    padding:8px 11px;border-radius:9px;font-size:13px;outline:none;font-family:inherit;transition:border-color .12s,box-shadow .12s;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  textarea{resize:vertical;width:100%;line-height:1.5;}

  /* ---- Cards / stats ---- */
  .funnel{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:14px;margin-bottom:20px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
  .card .num{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .card .lbl{color:var(--muted);font-size:12px;margin-top:7px;font-weight:500;}
  .card::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);}
  .card.k-new::after{background:var(--blue);}
  .card.k-messaged::after,.card.k-in_dialog::after{background:var(--accent);}
  .card.k-meeting_set::after,.card.k-met::after,.card.k-won::after{background:var(--green);}
  .card.k-lost::after,.card.k-stop::after{background:var(--red);}
  .strip{display:flex;gap:12px;margin-bottom:26px;flex-wrap:wrap;}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:11px 17px;box-shadow:var(--shadow-sm);}
  .stat b{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;} .stat span{color:var(--muted);font-size:12px;margin-left:6px;}

  /* ---- Smart table ---- */
  .ttoolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  .ttoolbar .grow{flex:1;}
  .ttoolbar .hint{color:var(--muted);font-size:12px;}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
  th,td{text-align:left;padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;white-space:nowrap;background:var(--panel2);position:relative;}
  th:hover{color:var(--text);}
  .rsz{position:absolute;right:0;top:0;height:100%;width:7px;cursor:col-resize;}
  .rsz:hover{background:var(--accent);opacity:.45;}
  tr.filtrow th{background:var(--panel);padding:4px 8px;text-transform:none;}
  .colrow:hover{border-color:var(--accent)!important;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:#FBFAF5;}
  tbody tr.clk{cursor:pointer;}
  .grouphdr td{background:var(--accent-soft);color:#7A530A;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;}
  .name{font-weight:600;}
  .sub{color:var(--muted);font-size:12px;}
  .mono{font-variant-numeric:tabular-nums;}
  .tg{color:var(--blue);} .no{color:#B6B0A0;}

  .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid;white-space:nowrap;background:var(--panel);}
  .b-new{color:var(--blue);border-color:#BBD0F4;background:#EEF4FE;}
  .b-messaged,.b-in_dialog{color:#9A6A07;border-color:#EAD6A6;background:var(--accent-soft);}
  .b-meeting_set,.b-met,.b-won{color:#157A43;border-color:#B7E2C7;background:var(--green-soft);}
  .b-lost,.b-stop{color:var(--red);border-color:#EDC3C0;background:#FBEEED;}
  .b-nurture{color:var(--muted);border-color:var(--border);background:var(--panel2);}
  .b-active{color:#157A43;border-color:#B7E2C7;background:var(--green-soft);}

  .tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
  .tag{background:var(--accent-soft);color:#8A5E08;border:1px solid #EAD6A6;border-radius:7px;padding:1px 8px;font-size:11px;display:inline-flex;gap:5px;align-items:center;}
  .tag x{cursor:pointer;color:#B89A55;font-style:normal;}
  .tag x:hover{color:var(--red);}
  .tag-add{cursor:pointer;color:var(--muted);border:1px dashed var(--border);border-radius:7px;padding:0 8px;font-size:12px;}
  .tag-add:hover{color:var(--accent);border-color:var(--accent);}

  /* ---- Kanban ---- */
  .kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;}
  .kcol{flex:0 0 230px;background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;max-height:72vh;}
  .kcol h3{margin:0;padding:12px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-weight:700;}
  .kcol h3 .n{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:0 8px;color:var(--text);}
  .kbody{padding:10px;overflow-y:auto;flex:1;min-height:60px;}
  .kbody.over{background:var(--accent-soft);outline:1px dashed var(--accent);outline-offset:-4px;}
  .kcard{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:9px;cursor:grab;box-shadow:var(--shadow-sm);transition:border-color .12s,box-shadow .12s;}
  .kcard:hover{border-color:var(--accent);box-shadow:var(--shadow);}
  .kcard .nm{font-weight:600;font-size:13px;}
  .kcard .mt{color:var(--muted);font-size:11px;margin-top:3px;}

  /* ---- Chats ---- */
  .chat-wrap{display:flex;gap:16px;height:74vh;}
  .chat-list{flex:0 0 310px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow-y:auto;box-shadow:var(--shadow);}
  .chat-item{padding:13px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
  .chat-item:hover,.chat-item.sel{background:var(--panel2);}
  .chat-item.sel{box-shadow:inset 3px 0 0 var(--accent);}
  .chat-item .nm{font-weight:600;}
  .chat-item .pv{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .thread{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;box-shadow:var(--shadow);}
  .thread .th-hd{padding:15px 17px;border-bottom:1px solid var(--border);font-weight:600;}
  .th-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:9px;background:var(--panel2);}
  .bubble{max-width:70%;padding:10px 14px;border-radius:16px;font-size:13px;white-space:pre-wrap;box-shadow:var(--shadow-sm);}
  .bubble.in{background:var(--panel);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:5px;}
  .bubble.out{background:#FBEFD2;border:1px solid #EAD6A6;align-self:flex-end;border-bottom-right-radius:5px;}
  .bubble .t{font-size:10px;color:var(--muted);margin-top:5px;}

  /* ---- Detail drawer (досье) ---- */
  .drawer{position:fixed;top:0;right:0;width:430px;max-width:92vw;height:100vh;background:var(--panel);
    border-left:1px solid var(--border);box-shadow:-18px 0 50px rgba(28,24,12,.14);z-index:20;
    transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
  .drawer.open{transform:translateX(0);}
  .drawer .dh{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;border-bottom:1px solid var(--border);}
  .drawer .dh b{font-size:16px;}
  .drawer .db{padding:22px;overflow-y:auto;flex:1;}
  .field{margin-bottom:15px;} .field label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;font-weight:600;}
  .field .v{font-size:14px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
  a.ext{color:var(--blue);text-decoration:none;font-weight:500;} a.ext:hover{text-decoration:underline;}
  .empty{text-align:center;color:var(--muted);padding:50px;}
  .stub{text-align:center;color:var(--muted);padding:60px 20px;}
  .stub .big{font-size:40px;margin-bottom:14px;}
  hr{border:none;border-top:1px solid var(--border);margin:18px 0;}
  .bellwrap{position:relative;display:inline-block;}
  .bell-badge{position:absolute;top:-6px;right:-6px;background:#E0492F;color:#fff;border-radius:20px;
    font-size:10px;font-weight:700;min-width:16px;height:16px;line-height:16px;text-align:center;padding:0 4px;}
  .notif{position:absolute;right:0;top:42px;width:360px;max-height:60vh;overflow:auto;background:var(--panel);
    border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 32px rgba(0,0,0,.18);z-index:50;padding:6px;}
  .notif .ni{padding:9px 11px;border-radius:8px;cursor:pointer;display:flex;gap:9px;align-items:flex-start;}
  .notif .ni:hover{background:var(--panel2);}
  .notif .ni .ic{font-size:15px;}
  .notif .ni .tx{flex:1;min-width:0;}
  .notif .ni .who{font-weight:600;font-size:13px;}
  .notif .ni .msg{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .notif .ni .tm{color:var(--muted);font-size:11px;white-space:nowrap;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#DBD5C7;border-radius:6px;border:2px solid var(--bg);}
  ::-webkit-scrollbar-thumb:hover{background:#C9C2B0;}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><h1>AX<span class="ac">I</span>OM</h1><small>пульт оператора</small></div>
    <nav id="nav"></nav>
    <div class="foot"><span class="dot"></span>@iivairf · онлайн</div>
  </aside>
  <div class="content">
    <div class="topbar">
      <h2 id="title">Дашборд</h2>
      <div class="right"><span class="upd" id="upd">—</span>
        <div class="bellwrap"><button id="bell" title="Уведомления">🔔<span class="bell-badge" id="bell-badge" style="display:none">0</span></button>
          <div class="notif" id="notif" style="display:none"></div></div>
        <button id="refresh">⟳ Обновить</button></div>
    </div>
    <main id="view"></main>
  </div>
</div>
<div class="drawer" id="drawer"><div class="dh"><b id="dr-title">Досье</b><button id="dr-close">✕</button></div><div class="db" id="dr-body"></div></div>

<script>
// ----------------------------------------------------------------- helpers
const STATUS_RU={new:"Новый",messaged:"Написано",in_dialog:"В диалоге",meeting_set:"Встреча",met:"Встреча прошла",won:"Сделка",lost:"Потерян",nurture:"Прогрев",stop:"Стоп"};
const STAGES=["new","messaged","in_dialog","meeting_set","met","won","nurture","lost","stop"];
const $=s=>document.querySelector(s);
const api=(u,o)=>fetch(u,o).then(r=>r.json());
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function fmt(ts){if(!ts)return"";const d=new Date(ts.replace(" ","T")+"Z");return isNaN(d)?ts:d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});}
function statusBadge(s){return `<span class="badge b-${s}">${STATUS_RU[s]||s}</span>`;}
function chCell(c){if(c.username)return `<span class="tg">@${esc(c.username)}</span>`;if(c.phone)return `<span class="sub mono">${esc(c.phone)}</span>`;return '<span class="no">—</span>';}

const NAV_GROUPS=[
  {title:"",items:[
    {id:"dashboard",ic:"📊",label:"Дашборд"},
    {id:"calendar",ic:"📅",label:"Календарь"},
  ]},
  {title:"CRM",collapsible:true,items:[
    {id:"deals",ic:"💼",label:"Сделки"},
    {id:"contacts",ic:"👤",label:"Контакты"},
    {id:"companies",ic:"🏢",label:"Компании"},
  ]},
  {title:"Лидген",collapsible:true,items:[
    {id:"campaigns",ic:"🎯",label:"Кампании"},
    {id:"hits",ic:"🔎",label:"Запросы"},
    {id:"chats",ic:"💬",label:"Диалоги"},
  ]},
  {title:"Ресурсы",collapsible:true,items:[
    {id:"agents",ic:"📱",label:"Аккаунты"},
    {id:"chatcat",ic:"📡",label:"Чаты"},
    {id:"proxy",ic:"🛡️",label:"Прокси"},
    {id:"parser",ic:"🛰️",label:"Парсинг"},
  ]},
  {title:"Агенты",collapsible:true,items:[
    {id:"aiagents",ic:"🤖",label:"ИИ-агенты"},
  ]},
];
const NAV=NAV_GROUPS.flatMap(g=>g.items).concat([{id:"projects",ic:"📁",label:"Проекты"}]);
let STATE={contacts:[],stats:null};
let PROJECT_SEL=null; // выбранный проект (фильтрует кампании)

// ----------------------------------------------------------------- smart table
// cfg: {columns:[{key,label,render?,cls?}], rows, searchKeys, groupOptions:[{key,label}], onRowClick, tagsCfg}
function smartTable(mount,cfg){
  const KEY="axiom_tbl_"+(cfg.tableKey||"def");
  const allCols=cfg.columns;
  let saved={};try{saved=JSON.parse(localStorage.getItem(KEY)||"{}");}catch(e){}
  const st={q:"",group:"",sortKey:null,sortDir:1,showPicker:false,
    hidden:new Set(saved.hidden||[]),
    order:(saved.order&&saved.order.length?saved.order.slice():allCols.map(c=>c.key)),
    widths:saved.widths||{},colFilters:saved.colFilters||{},
    showFilters:!!(saved.colFilters&&Object.values(saved.colFilters).some(Boolean))};
  allCols.forEach(c=>{if(!st.order.includes(c.key))st.order.push(c.key);});
  const colByKey=k=>allCols.find(c=>c.key===k);
  const visCols=()=>st.order.map(colByKey).filter(c=>c&&!st.hidden.has(c.key));
  const persist=()=>localStorage.setItem(KEY,JSON.stringify({hidden:[...st.hidden],order:st.order,widths:st.widths,colFilters:st.colFilters}));
  const wrap=document.createElement("div");
  const groupOpts=`<option value="">без группировки</option>`+(cfg.groupOptions||[]).map(g=>`<option value="${g.key}">группа: ${g.label}</option>`).join("");
  wrap.innerHTML=`<div class="ttoolbar">
      <input class="grow" id="st-q" placeholder="🔍 фильтр по таблице…">
      ${cfg.groupOptions?`<select id="st-g">${groupOpts}</select>`:""}
      <button id="st-filt" title="фильтры по колонкам">🔽 фильтры</button>
      <button id="st-cols" title="настроить колонки (показать/скрыть, порядок, ширина)">⚙ колонки</button>
      <span class="hint" id="st-cnt"></span>
    </div>
    <div id="st-pick" class="card" style="display:none;margin-bottom:10px"></div>
    <div id="st-tbl"></div>`;
  mount.appendChild(wrap);
  const drawPicker=()=>{
    const p=wrap.querySelector("#st-pick");p.style.display=st.showPicker?"block":"none";
    if(!st.showPicker)return;
    p.innerHTML=`<div style="font-weight:600;margin-bottom:8px">Колонки — перетащи ⠿ для порядка, галочка = показывать, край заголовка тяни для ширины</div>`+
      st.order.map(k=>{const c=colByKey(k);if(!c)return"";
        return `<div class="colrow" draggable="true" data-k="${k}" style="display:flex;align-items:center;gap:8px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;margin-bottom:4px;background:var(--panel);cursor:grab">
          <span style="color:var(--muted)">⠿</span>
          <label style="display:flex;align-items:center;gap:6px;flex:1;cursor:pointer"><input type="checkbox" ${st.hidden.has(k)?"":"checked"} data-k="${k}" class="colchk"> ${esc(c.label||k)}</label></div>`;}).join("")+
      `<button id="st-reset" style="margin-top:6px">↺ сбросить вид</button>`;
    p.querySelectorAll(".colchk").forEach(ch=>ch.onchange=()=>{const k=ch.dataset.k;ch.checked?st.hidden.delete(k):st.hidden.add(k);persist();draw();});
    let dk=null;
    p.querySelectorAll(".colrow").forEach(row=>{
      row.ondragstart=()=>{dk=row.dataset.k;row.style.opacity=".4";};
      row.ondragend=()=>row.style.opacity="1";
      row.ondragover=e=>e.preventDefault();
      row.ondrop=e=>{e.preventDefault();const tk=row.dataset.k;if(!dk||dk===tk)return;
        const f=st.order.indexOf(dk);st.order.splice(f,1);st.order.splice(st.order.indexOf(tk),0,dk);persist();drawPicker();draw();};
    });
    p.querySelector("#st-reset").onclick=()=>{st.hidden=new Set();st.order=allCols.map(c=>c.key);st.widths={};st.colFilters={};st.showFilters=false;persist();drawPicker();draw();};
  };
  const draw=()=>{
    const cols=visCols();
    let rows=cfg.rows.slice();
    if(st.q){const q=st.q.toLowerCase();rows=rows.filter(r=>(cfg.searchKeys||Object.keys(r)).some(k=>String(r[k]??"").toLowerCase().includes(q)));}
    Object.keys(st.colFilters).forEach(k=>{const fv=(st.colFilters[k]||"").toLowerCase();if(fv)rows=rows.filter(r=>String(r[k]??"").toLowerCase().includes(fv));});
    if(st.sortKey)rows.sort((a,b)=>{const x=a[st.sortKey]??"",y=b[st.sortKey]??"";return (x>y?1:x<y?-1:0)*st.sortDir;});
    wrap.querySelector("#st-cnt").textContent=`${rows.length} из ${cfg.rows.length}`;
    const w=k=>st.widths[k]?` style="width:${st.widths[k]}px;min-width:${st.widths[k]}px"`:"";
    const head=`<tr>${cols.map(c=>`<th data-k="${c.key}"${w(c.key)}>${c.label}${st.sortKey===c.key?(st.sortDir>0?" ▲":" ▼"):""}<span class="rsz" data-k="${c.key}"></span></th>`).join("")}</tr>`;
    const filtRow=st.showFilters?`<tr class="filtrow">${cols.map(c=>`<th><input class="cf" data-k="${c.key}" value="${esc(st.colFilters[c.key]||"")}" placeholder="фильтр…" style="width:100%;font-weight:400;font-size:12px;padding:3px 6px"></th>`).join("")}</tr>`:"";
    const cell=(r,c)=>`<td class="${c.cls||""}"${w(c.key)}>${c.render?c.render(r):esc(r[c.key])}</td>`;
    const rowHtml=r=>`<tr class="${cfg.onRowClick?"clk":""}" data-id="${r.id}">${cols.map(c=>cell(r,c)).join("")}</tr>`;
    let body="";
    if(st.group){
      const groups={};rows.forEach(r=>{const g=r[st.group]||"—";(groups[g]=groups[g]||[]).push(r);});
      Object.keys(groups).sort().forEach(g=>{
        const label=cfg.groupFmt?cfg.groupFmt(st.group,g):g;
        body+=`<tr class="grouphdr"><td colspan="${cols.length}">${label} · ${groups[g].length}</td></tr>`;
        body+=groups[g].map(rowHtml).join("");
      });
    } else body=rows.map(rowHtml).join("");
    if(!rows.length)body=`<tr><td colspan="${cols.length}" class="empty">${cfg.emptyText||"Ничего не найдено"}</td></tr>`;
    wrap.querySelector("#st-tbl").innerHTML=`<table><thead>${head}${filtRow}</thead><tbody>${body}</tbody></table>`;
    wrap.querySelectorAll("thead tr:first-child th").forEach(th=>th.onclick=e=>{if(e.target.classList.contains("rsz"))return;const k=th.dataset.k;if(st.sortKey===k)st.sortDir*=-1;else{st.sortKey=k;st.sortDir=1;}draw();});
    wrap.querySelectorAll(".cf").forEach(inp=>{inp.onclick=e=>e.stopPropagation();
      inp.oninput=()=>{const k=inp.dataset.k,pos=inp.selectionStart;st.colFilters[k]=inp.value;persist();draw();
        const ni=wrap.querySelector(`.cf[data-k="${k}"]`);if(ni){ni.focus();try{ni.setSelectionRange(pos,pos);}catch(e){}}};});
    wrap.querySelectorAll(".rsz").forEach(h=>{h.onmousedown=e=>{e.preventDefault();e.stopPropagation();
      const k=h.dataset.k,th=h.closest("th"),sx=e.pageX,sw=th.offsetWidth;
      const mv=ev=>{const nw=Math.max(50,sw+ev.pageX-sx);st.widths[k]=nw;th.style.width=nw+"px";th.style.minWidth=nw+"px";};
      const up=()=>{document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);persist();};
      document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up);};});
    if(cfg.onRowClick)wrap.querySelectorAll("tbody tr.clk").forEach(tr=>tr.onclick=e=>{if(e.target.closest(".tag,.tag-add,.tag x,a,input,select,button"))return;cfg.onRowClick(+tr.dataset.id);});
    bindTags(wrap);
  };
  wrap.querySelector("#st-q").oninput=e=>{st.q=e.target.value;draw();};
  if(cfg.groupOptions)wrap.querySelector("#st-g").onchange=e=>{st.group=e.target.value;draw();};
  wrap.querySelector("#st-cols").onclick=()=>{st.showPicker=!st.showPicker;drawPicker();};
  wrap.querySelector("#st-filt").onclick=()=>{st.showFilters=!st.showFilters;draw();};
  drawPicker();draw();
}
function tagsCell(r){
  const chips=(r.tags||[]).map(t=>`<span class="tag">${esc(t)} <x data-id="${r.id}" data-t="${esc(t)}">✕</x></span>`).join("");
  return `<span class="tags">${chips}<span class="tag-add" data-id="${r.id}">+ тег</span></span>`;
}
function bindTags(scope){
  scope.querySelectorAll(".tag-add").forEach(b=>b.onclick=async e=>{e.stopPropagation();
    const id=+b.dataset.id,t=prompt("Новый тег:");if(!t)return;
    const c=STATE.contacts.find(x=>x.id===id);const tags=[...(c.tags||[]),t.trim()];
    await api(`/api/contact/${id}/tags`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tags})});
    c.tags=tags;route();});
  scope.querySelectorAll(".tag x").forEach(x=>x.onclick=async e=>{e.stopPropagation();
    const id=+x.dataset.id,t=x.dataset.t;const c=STATE.contacts.find(v=>v.id===id);
    const tags=(c.tags||[]).filter(v=>v!==t);
    await api(`/api/contact/${id}/tags`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tags})});
    c.tags=tags;route();});
}

  $("#ab-status-go").onclick=()=>{const s=$("#ab-status").value;if(!s){$("#ab-msg").textContent="выбери статус";return;}bulk({action:"status",status:s},r=>`статус «${ACC_ST[r.status]||r.status}» у ${r.updated}`);};

function showLoginDialog(accId,phone,label){
  const modal=document.createElement("div");
  modal.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999";
  modal.innerHTML=`<div style="background:var(--bg);border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.3);max-width:440px;width:92%;padding:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <b style="font-size:16px">🔌 Подключить аккаунт</b><button class="lg-close">✕</button></div>
    <div class="sub" style="margin-bottom:14px">${esc(label||"")} · ${esc(phone||"")}<br>Telegram пришлёт код в приложение (или SMS).</div>
    <div id="lg-step1">
      <button class="primary" id="lg-send" style="width:100%;padding:10px">Запросить код</button>
    </div>
    <div id="lg-step2" style="display:none">
      <div class="field"><label>Код из Telegram</label><input id="lg-code" inputmode="numeric" placeholder="12345" style="width:100%;letter-spacing:4px;font-size:18px;text-align:center"></div>
      <div class="field" id="lg-pwd-box" style="display:none"><label>Пароль 2FA (облачный пароль)</label><input id="lg-pwd" type="password" placeholder="если включён вход по паролю" style="width:100%"></div>
      <button class="primary" id="lg-confirm" style="width:100%;padding:10px">Войти</button>
    </div>
    <div id="lg-msg" style="margin-top:12px;font-size:13px"></div>
  </div>`;
  document.body.appendChild(modal);
  const $m=s=>modal.querySelector(s);
  const close=()=>modal.remove();
  $m(".lg-close").onclick=close;modal.onclick=e=>{if(e.target===modal)close();};
  const msg=(t,err)=>{$m("#lg-msg").innerHTML=`<span style="color:${err?'#c0392b':'var(--green)'}">${esc(t)}</span>`;};
  $m("#lg-send").onclick=async()=>{
    const b=$m("#lg-send");b.disabled=true;b.textContent="запрашиваю…";msg("");

let PIPELINES=[], PIPELINE_SEL=null;
async function loadPipelines(){

function dealStagesFor(pid){
  const p=PIPELINES.find(x=>x.id===pid)||PIPELINES.find(x=>x.is_default)||PIPELINES[0];

}

function dealTitle(d){return esc(d.title||d.company_name||"сделка");}
function dealSub(d){return esc([d.person_name||d.contact_name,d.amount?(Number(d.amount).toLocaleString("ru-RU")+" ₽"):""].filter(Boolean).join(" · "));}
function renderDealsKanban(mount){
  const stages=dealStagesFor(PIPELINE_SEL);
  const by={};stages.forEach(s=>by[s.key]=[]);
  DEALS.forEach(d=>{const k=by[d.stage]?d.stage:(stages[0]&&stages[0].key);if(by[k])by[k].push(d);});
  const kan=document.createElement("div");kan.className="kanban";
  kan.innerHTML=stages.map(s=>`<div class="kcol"><h3>${esc(s.label)}<span class="n">${(by[s.key]||[]).length}</span></h3>
    <div class="kbody" data-s="${s.key}">${(by[s.key]||[]).map(d=>`<div class="kcard" draggable="true" data-id="${d.id}">
      <div class="nm">${dealTitle(d)}</div><div class="mt">${dealSub(d)||esc(d.company_name||"")}</div></div>`).join("")}</div></div>`).join("");
  mount.appendChild(kan);
  kan.querySelectorAll(".kcard").forEach(card=>card.onclick=()=>openDeal(+card.dataset.id));
  let drag=null;
  kan.querySelectorAll(".kcard").forEach(card=>{
    card.ondragstart=()=>{drag=+card.dataset.id;card.style.opacity=".4";};
    card.ondragend=()=>{card.style.opacity="1";};
  });
  kan.querySelectorAll(".kbody").forEach(col=>{
    col.ondragover=e=>{e.preventDefault();col.classList.add("over");};
    col.ondragleave=()=>col.classList.remove("over");
    col.ondrop=async e=>{e.preventDefault();col.classList.remove("over");
      const s=col.dataset.s;if(drag==null)return;
      await api(`/api/deal/${drag}/move`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({stage:s})});
      const d=DEALS.find(x=>x.id===drag);if(d)d.stage=s;drag=null;route();};
  });
}
function dealsTable(mount){
  smartTable(mount,{
    tableKey:"deals",
    rows:DEALS,searchKeys:["title","company_name","person_name","contact_name","product","stage"],
    groupOptions:[{key:"stage",label:"стадия"},{key:"product",label:"продукт"}],
    groupFmt:(k,val)=>k==="stage"?(STATUS_RU[val]||val):val,

  });

// ===== Карточка СДЕЛКИ (drawer) =====
async function openDeal(id){
  const d=await api(`/api/deal/${id}`);
  if(d.error){alert("Сделка не найдена");return;}
  if(!PIPELINES.length){try{await loadPipelines();}catch(e){}}
  $("#dr-title").textContent=d.title||("Сделка #"+id);
  const stages=dealStagesFor(d.pipeline_id);
  const pOpts=PIPELINES.map(p=>`<option value="${p.id}" ${p.id===d.pipeline_id?"selected":""}>${esc(p.name)}</option>`).join("");
  $("#dr-body").innerHTML=`
    <div class="field"><label>Название</label><input data-k="title" value="${esc(d.title||"")}"></div>
    <div class="row2"><div class="field"><label>Стадия</label><select data-k="stage">${stages.map(s=>`<option value="${s.key}" ${s.key===d.stage?"selected":""}>${esc(s.label)}</option>`).join("")}</select></div>
      <div class="field"><label>Сумма ₽</label><input data-k="amount" class="mono" value="${esc(d.amount||"")}"></div></div>
    <div class="row2"><div class="field"><label>Воронка</label><select data-k="pipeline_id">${pOpts}</select></div>
      <div class="field"><label>Продукт</label><input data-k="product" value="${esc(d.product||"")}"></div></div>
    <div class="field"><label>Компания</label><div class="v">${d.company_name?`<span class="lnk" data-cid="${d.company_id}" style="cursor:pointer">🏢 ${esc(d.company_name)}</span>`:'<span class="no">—</span>'}</div></div>
    <div class="field"><label>Контакт</label><div class="v">${(d.person_name||d.contact_name)?`<span class="lnk" data-pid="${d.contact_id}" style="cursor:pointer">👤 ${esc(d.person_name||d.contact_name)}</span>`:'<span class="no">—</span>'}</div></div>
    <div class="field"><label>Заметки</label><textarea data-k="notes" rows="2">${esc(d.notes||"")}</textarea></div>
    <div class="ttoolbar" style="margin:6px 0"><button class="primary" id="dl-save">💾 Сохранить</button><button id="dl-del">🗑 Удалить</button></div>`;
  $("#dl-save").onclick=async()=>{const body={};$("#dr-body").querySelectorAll("[data-k]").forEach(el=>body[el.dataset.k]=el.dataset.k==="pipeline_id"?(+el.value||null):el.value);
    await api(`/api/deal/${id}/update`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    $("#dl-save").textContent="✓ сохранено";setTimeout(route,500);};
  $("#dl-del").onclick=async()=>{if(!confirm("Удалить сделку?"))return;
    await api(`/api/deal/${id}/delete`,{method:"POST"});$("#drawer").classList.remove("open");route();};
  $("#dr-body").querySelectorAll(".lnk[data-cid]").forEach(el=>el.onclick=()=>openCompany(+el.dataset.cid));
  $("#dr-body").querySelectorAll(".lnk[data-pid]").forEach(el=>el.onclick=()=>openDossier(+el.dataset.pid));
  $("#drawer").classList.add("open");
}

    :`<div id="ag-ava" style="width:84px;height:84px;border-radius:50%;background:var(--accent-soft);color:#7A530A;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700">${esc((a.label||a.phone||"?").slice(0,1).toUpperCase())}</div>`;
  const roleOpts=Object.entries(ROLE_RU).filter(([k])=>k).map(([k,v])=>`<option value="${k}" ${k===a.role?"selected":""}>${esc(v)}</option>`).join("");

  $("#dr-body").innerHTML=`
    <div style="display:flex;gap:16px;align-items:center;margin-bottom:14px">
      ${ava}
      <div><button id="ag-ava-btn">📷 Загрузить фото</button><input type="file" id="ag-ava-file" accept="image/*" style="display:none">
        <div class="hint" style="margin-top:6px">до 5 МБ, png/jpg</div></div>
    </div>
    <div class="row2"><div class="field"><label>Ярлык</label><input data-k="label" value="${esc(a.label||"")}"></div>
      <div class="field"><label>Телефон</label><input data-k="phone" class="mono" value="${esc(a.phone||"")}"></div></div>
    <div class="row2"><div class="field"><label>Ник TG</label><input data-k="username" value="${esc(a.username||"")}"></div>
      <div class="field"><label>Лимит/день</label><input data-k="daily_limit" type="number" class="mono" value="${a.daily_limit||15}"></div></div>
    <div class="row2"><div class="field"><label>Роль</label><select data-k="role">${roleOpts}</select></div>
      <div class="field"><label>Статус</label><select data-k="status">${stOpts}</select></div></div>
    <label style="display:flex;align-items:center;gap:8px;margin:2px 0 12px;font-weight:600;padding:8px 10px;background:var(--panel2);border-radius:8px"><input type="checkbox" data-k="protected" ${a.protected?"checked":""}> 🏠 Родной (личный) номер — автоматика (прогрев/рассылка) его НЕ трогает</label>
    <div class="field"><label>📝 Описание профиля (для команды)</label>
      <textarea data-k="description" rows="4" placeholder="Кто этот агент, легенда, специализация, особенности общения…">${esc(a.description||"")}</textarea>
      <div class="ttoolbar" style="margin:6px 0 0"><button id="ag-profile-setup">✨ Оформить профиль в Telegram (фото + bio)</button></div>
      <div class="hint" style="margin-top:4px">Поставит аватар и био (первые 70 симв. описания) прямо в аккаунт. Нужна авторизованная сессия. Сохрани изменения перед оформлением.</div>
      <pre id="ag-profile-log" style="display:none;white-space:pre-wrap;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:8px;max-height:160px;overflow:auto;font-size:12px"></pre></div>
    <div class="field"><label>🛡️ Прокси аккаунта</label>
      <input data-k="proxy" id="ag-proxy-inp" class="mono" value="${esc(a.proxy||"")}" placeholder="socks5://user:pass@host:port  (для купленных — SOCKS5, не MTProto)">
      <div class="ttoolbar" style="margin:6px 0 0"><button id="ag-proxy-find">🔎 Найти бесплатный SOCKS5</button><button id="ag-proxy-auto">📡 Авто MTProto из пула (только TG)</button></div>
      <div class="hint" style="margin-top:4px">«Найти бесплатный» проверит публичные SOCKS5 на доступ к Telegram и подставит живой (для теста; для боя — платный мобильный).</div>
      <pre id="ag-proxy-log" style="display:none;white-space:pre-wrap;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:8px;max-height:200px;overflow:auto;font-size:12px"></pre></div>
    <div class="field"><label>🔥 Прогрев</label>
      <div class="hint" style="margin-bottom:6px">Нужно: статус «прогрев» + TG✓ (подключён) + рабочий прокси. Один заход = одна стадия (всего ~14).</div>
      <button id="ag-warm-now">🔥 Прогреть сейчас (с логом)</button>
      <pre id="ag-warm-log" style="display:none;white-space:pre-wrap;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:8px;max-height:240px;overflow:auto;font-size:12px"></pre></div>
    <div class="ttoolbar" style="margin:6px 0"><button class="primary" id="ag-save">💾 Сохранить</button></div>`;
  const pa=$("#ag-proxy-auto");if(pa)pa.onclick=async()=>{pa.disabled=true;pa.textContent="…";
    const r=await api(`/api/account/${id}/proxy_auto`,{method:"POST"});
    pa.disabled=false;pa.textContent="📡 Авто MTProto из пула (только TG)";
    if(r.error){alert(r.error);return;}
    const inp=$("#ag-proxy-inp");if(inp)inp.value=r.proxy;};
  const pf=$("#ag-proxy-find");if(pf)pf.onclick=async()=>{pf.disabled=true;pf.textContent="ищу живой… (до 4 мин)";
    const log=$("#ag-proxy-log");log.style.display="block";log.textContent="тяну списки и проверяю SOCKS5 на доступ к Telegram…";
    const r=await api(`/api/account/${id}/proxy_find`,{method:"POST"});
    pf.disabled=false;pf.textContent="🔎 Найти бесплатный SOCKS5";
    log.textContent=(r.output||"(пусто)");
    const inp=$("#ag-proxy-inp");if(inp&&r.proxy)inp.value=r.proxy;};
  const wn=$("#ag-warm-now");if(wn)wn.onclick=async()=>{wn.disabled=true;wn.textContent="прогреваю… (до 5 мин)";
    const log=$("#ag-warm-log");log.style.display="block";log.textContent="запускаю прогрев #"+id+"…";
    const r=await api(`/api/account/${id}/warm_now`,{method:"POST"});
    wn.disabled=false;wn.textContent="🔥 Прогреть сейчас (с логом)";
    log.textContent=(r.output||"(пусто)");};
  const ps=$("#ag-profile-setup");if(ps)ps.onclick=async()=>{
    // сначала сохраняем поля карточки (чтобы био взялось из свежего описания), затем оформляем
    const body={};$("#dr-body").querySelectorAll("[data-k]").forEach(el=>body[el.dataset.k]=el.type==="checkbox"?el.checked:el.value);
    await api(`/api/account/${id}/update`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    ps.disabled=true;ps.textContent="оформляю…";
    const log=$("#ag-profile-log");log.style.display="block";log.textContent="ставлю аватар и био в Telegram…";
    const r=await api(`/api/account/${id}/profile_setup`,{method:"POST"});
    ps.disabled=false;ps.textContent="✨ Оформить профиль в Telegram (фото + bio)";
    if(r.error){log.textContent="⚠ "+r.error;return;}
    log.textContent="✓ Готово для @"+(r.username||id)+" — поставлено: "+((r.set||[]).join(", ")||"ничего");};
  const fileInp=$("#ag-ava-file");
  $("#ag-ava-btn").onclick=()=>fileInp.click();
  fileInp.onchange=async()=>{if(!fileInp.files.length)return;
    const fd=new FormData();fd.append("file",fileInp.files[0]);
    const r=await fetch(`/api/account/${id}/avatar`,{method:"POST",body:fd}).then(x=>x.json());
    if(r.error){alert(r.error);return;}openAgent(id);};
  $("#ag-save").onclick=async()=>{const body={};$("#dr-body").querySelectorAll("[data-k]").forEach(el=>body[el.dataset.k]=el.type==="checkbox"?el.checked:el.value);
    await api(`/api/account/${id}/update`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    $("#ag-save").textContent="✓ сохранено";setTimeout(route,500);};
  $("#drawer").classList.add("open");
}

      {key:"city",label:"Город",cls:"sub",render:r=>esc(r.city)||"—"},
      {key:"topic",label:"Тема",cls:"sub",render:r=>esc(r.topic)||"—"},
      {key:"members_count",label:"Участники",cls:"mono",render:r=>r.members_count!=null?Number(r.members_count).toLocaleString("ru-RU"):"—"},
      {key:"can_write",label:"Могу писать",render:r=>r.can_write?`<span class="badge b-${r.can_write==='да'?'active':(r.can_write==='заблокирован'||r.can_write==='только админы'||r.can_write==='ограничено')?'stop':'nurture'}">${esc(r.can_write)}</span>`:"—"},

      setTimeout(()=>{modal.style.display="none";route();},2000);
    }else{
      res.innerHTML=`<b style="color:var(--red)">✗ Ошибка: ${esc(r.error)}</b>`;
      submit.disabled=false;submit.textContent="✓ Импортировать";
    }
  };
}

  const renderMain=()=>{
    const box=$("#c-main-acc");if(!box)return;

  const renderTeam=()=>{
    const box=$("#c-team-box");if(!box)return;

  const fill=(c)=>{
    $("#c-name").value=c.name||"";$("#c-product").value=c.product||"";

    box.innerHTML=kps.map(k=>kpCard(eid,k)).join("")+`<button type="button" id="c-kp-add">➕ Добавить КП</button>`;

    box.querySelector("#c-kp-add").onclick=async()=>{await api(`/api/campaign/${eid}/kps`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:"Новый тип"})});reload();};
    box.querySelectorAll(".kp-save").forEach(b=>b.onclick=async()=>{const id=b.dataset.id;

      $("#c-kp-del").onclick=async()=>{
        if(!confirm("Удалить файл КП из кампании?"))return;
        await fetch(`/api/campaign/${eid}/kp/delete`,{method:"POST"});
        c.kp_file=null;renderKpBox(c);
      };
    } else {
      box.innerHTML=`<input type="file" id="c-kp-file"> <button id="c-kp-up">Прикрепить</button>
        <span class="hint" style="margin-left:8px">до 20 МБ</span>`;

      if(!fileInp||!fileInp.files.length){alert("выбери файл");return;}
      const fd=new FormData();fd.append("file",fileInp.files[0]);
      const r=await fetch(`/api/campaign/${eid}/kp`,{method:"POST",body:fd}).then(x=>x.json());
      if(r.error){alert(r.error);return;}
      c.kp_file=r.kp_file;renderKpBox(c);

    const eid=form.dataset.edit;
    const r=await api(eid?`/api/campaign/${eid}/update`:"/api/campaigns",
      {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(r.error){alert(r.error);return;}route();

    fill(c);$("#c-save").textContent="Сохранить изменения";form.style.display="block";form.scrollIntoView({behavior:"smooth"});
  };
  renderCampList($("#c-list"),camps);
}

    const render=async()=>{
      const d=await api(`/api/campaign/${id}/team`);

      const rows=team.map(a=>{const pct=Math.round((a.warm_stage||0)/(a.ready_stage||7)*100);

      box.innerHTML=`<div class="card" style="background:var(--panel2);padding:12px">
        ${team.length?`<table style="width:100%;border-collapse:collapse"><tr><th>Аккаунт</th><th>Сессия</th><th>Статус</th><th>Прогрев</th></tr>${rows}</table>`:'<div class="sub">В команде нет аккаунтов. Добавь их в «⚙ Настроить» → «Команда агентов».</div>'}
        <div class="ttoolbar" style="margin:10px 0 0"><button class="primary" id="warm-go-${id}">🔥 Запустить ступень прогрева</button><span class="hint" id="warm-msg"></span></div>

          <label style="display:inline-flex;align-items:center;gap:6px;margin-left:14px"><input type="checkbox" id="warm-camix"> 📊 микс 10-20% реальной ЦА (поздние ступени)</label>
          <button id="warm-set-save">сохранить</button><span class="hint" id="warm-set-msg"></span></div>
        <div class="hint" style="margin-top:8px">Безопасно: одна ступень = «день» (~2 недели до «активен»). Первые дни — только пассив (каналы, чтение, лайки, сторис, онлайн), ЛС позже и плавно. <b>ЦА-микс</b> (по галочке, реальные люди): со стадии 5 аккаунт добавляет 1→2→3 реальных касаний ЦА в день вперемешку — естественнее, меньше риск бана. Включай осознанно.</div></div>`;

let NAV_COLLAPSE={};try{NAV_COLLAPSE=JSON.parse(localStorage.getItem("axiom_nav_collapse")||"{}");}catch(e){}
let NAV_ORDER=null;try{NAV_ORDER=JSON.parse(localStorage.getItem("axiom_nav_order")||"null");}catch(e){}
function navApplyOrder(){
  if(!NAV_ORDER)return;
  NAV_GROUPS.forEach(g=>{const ord=NAV_ORDER[g.title||"_"];if(!ord)return;
    g.items.sort((a,b)=>{const ia=ord.indexOf(a.id),ib=ord.indexOf(b.id);return (ia<0?99:ia)-(ib<0?99:ib);});});
}
function renderNav(active){
  navApplyOrder();
  $("#nav").innerHTML=NAV_GROUPS.map(g=>{
    const col=g.collapsible&&NAV_COLLAPSE[g.title];
    const hdr=g.title?`<div class="navhdr" data-g="${g.title}" style="padding:14px 16px 5px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:700;${g.collapsible?'cursor:pointer;display:flex;justify-content:space-between;align-items:center':''}">${g.title}${g.collapsible?`<span style="font-size:9px;opacity:.7">${col?"▸":"▾"}</span>`:""}</div>`:"";
    const items=col?"":g.items.map(n=>`<a draggable="true" data-id="${n.id}" data-g="${g.title||'_'}" class="${n.id===active?"active":""}"><span class="ic">${n.ic}</span>${n.label}${n.cnt!=null?`<span class="cnt">${n.cnt}</span>`:""}</a>`).join("");
    return hdr+items;
  }).join("");
  $("#nav").querySelectorAll("a").forEach(a=>a.onclick=()=>{location.hash=a.dataset.id;});
  $("#nav").querySelectorAll(".navhdr[data-g]").forEach(h=>{if(!NAV_GROUPS.find(g=>g.title===h.dataset.g&&g.collapsible))return;
    h.onclick=()=>{NAV_COLLAPSE[h.dataset.g]=!NAV_COLLAPSE[h.dataset.g];localStorage.setItem("axiom_nav_collapse",JSON.stringify(NAV_COLLAPSE));renderNav(active);};});
  let drag=null;
  $("#nav").querySelectorAll("a[draggable]").forEach(a=>{
    a.ondragstart=()=>{drag=a;a.style.opacity=".4";};
    a.ondragend=()=>{a.style.opacity="1";drag=null;};
    a.ondragover=e=>e.preventDefault();
    a.ondrop=e=>{e.preventDefault();if(!drag||drag===a||drag.dataset.g!==a.dataset.g)return;
      const g=NAV_GROUPS.find(x=>(x.title||"_")===a.dataset.g);if(!g)return;
      const from=g.items.findIndex(i=>i.id===drag.dataset.id),to=g.items.findIndex(i=>i.id===a.dataset.id);
      const [m]=g.items.splice(from,1);g.items.splice(to,0,m);
      NAV_ORDER=NAV_ORDER||{};NAV_ORDER[a.dataset.g]=g.items.map(i=>i.id);
      localStorage.setItem("axiom_nav_order",JSON.stringify(NAV_ORDER));renderNav(active);};
  });
}

async function showAudiencePicker(d){

  if(!Array.isArray(all))all=[];

  $m("#ap-source").innerHTML='<option value="">любой источник</option>'+sources.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("");

        <div class="hint">Соберёт прокси из каналов и раздаст аккаунтам автоматически. Только Telegram, времянка — на боевую лучше платные.</div></div>`}
      <div class="hint" style="margin:10px 0">${edit?"Сохраню изменения в существующую кампанию (название, оффер→первое сообщение, промпт, аудитория, канал). Аккаунты/КП-набор — в «⚙ Настроить».":"При запуске создам: проект, воронку, кампанию (оффер → первое сообщение, промпт → агент), и нишу из ключей. Дальше назначишь аккаунты-отправители и жмёшь ▶."}</div>
      <button class="primary" id="wz-launch" style="font-size:15px;padding:12px 20px">${edit?"💾 Сохранить изменения":"💰 Запустить (клиенты на автомате)"}</button>
      <div id="wz-launch-msg" style="margin-top:10px"></div>`;
  }
  v.innerHTML=`<div class="card" id="wz-card" style="max-width:760px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>${dots}</div><button id="wz-exit">✕ выйти</button></div>
    <div style="font-weight:700;font-size:16px;margin-bottom:12px">${esc(step.t)}</div>
    ${body}
    <div class="ttoolbar" style="margin-top:16px">
      ${WZ.i>0?'<button id="wz-prev">← Назад</button>':''}
      <span class="grow"></span>
      ${WZ.i<WZ_STEPS.length-1?'<button class="primary" id="wz-next">Далее →</button>':''}
    </div></div>`;
  const save=()=>{const g=id=>{const el=document.getElementById(id);return el?el.value:undefined;};
    const map={"wz-name":"name","wz-client":"client","wz-channel":"channel","wz-goal":"goal","wz-audience_tag":"audience_tag","wz-keywords":"keywords","wz-funnel":"funnel","wz-kev":"kev","wz-offer":"offer","wz-prompt":"prompt"};
    for(const[id,k]of Object.entries(map)){const val=g(id);if(val!==undefined)d[k]=val;}wzPersist();};
  // автосохранение при любом вводе (на случай если выбьет/перезагрузит страницу)
  const wzCard=$("#wz-card");if(wzCard){wzCard.addEventListener("input",()=>save());wzCard.addEventListener("change",()=>save());}
  $("#wz-exit").onclick=()=>{save();WZ=null;route();};
  const pv=$("#wz-prev");if(pv)pv.onclick=()=>{save();WZ.i--;renderWizard();};
  const nx=$("#wz-next");if(nx)nx.onclick=()=>{save();WZ.i++;renderWizard();};
  const cop=$("#wz-cop");if(cop)cop.onclick=async()=>{save();const b=cop,m=$("#wz-cop-msg");b.disabled=true;b.textContent="думаю…";m.textContent="";
    const r=await api("/api/copilot",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({step:b.dataset.step,context:wzCtx()})});
    b.disabled=false;b.textContent="💡 Подсказка от Claude";
    if(r.error){m.innerHTML='<span style="color:#c0392b">'+esc(r.error)+'</span>';return;}
    $("#wz-cop-out").innerHTML=`<div class="card" style="background:var(--accent-soft);padding:10px;white-space:pre-wrap">${esc(r.text)}<div style="margin-top:8px"><button id="wz-cop-ins">↳ вставить в поле</button></div></div>`;
    const ins=$("#wz-cop-ins");if(ins)ins.onclick=()=>{const map={goal:"wz-goal",audience:"wz-keywords",funnel:"wz-funnel",offer:"wz-offer",prompt:"wz-prompt"};const t=document.getElementById(map[b.dataset.step]);if(t){t.value=(t.value?t.value+"\n":"")+r.text;save();}};
  };
  const gp=$("#wz-go-parser");if(gp)gp.onclick=()=>{save();WZ=null;location.hash="parser";};
  const g2=$("#wz-go-2gis");if(g2)g2.onclick=()=>{save();WZ=null;location.hash="companies";};
  const pc=$("#wz-pick-crm");if(pc)pc.onclick=()=>{save();showAudiencePicker(d);};
  const pg=$("#wz-phones-go");if(pg)pg.onclick=async()=>{const t=$("#wz-phones").value;if(!t.trim())return;pg.disabled=true;pg.textContent="…";
    const srcEl=$("#wz-phones-source");const source=(srcEl&&srcEl.value.trim())||"";
    const r=await api("/api/import/phones",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:t,tag:d.audience_tag,source})});
    pg.disabled=false;pg.textContent="Загрузить телефоны";
    $("#wz-phones-msg").textContent=r.error?("ошибка: "+r.error):`✅ загружено ${r.imported}, всего в базе ${r.total}`;};
  const lb=$("#wz-launch");if(lb)lb.onclick=()=>wzLaunch();
}
async function wzLaunch(){
  const d=WZ.data;const msg=$("#wz-launch-msg");const lb=$("#wz-launch");
  if(!d.name.trim()){msg.innerHTML='<span style="color:#c0392b">укажи название (шаг 1)</span>';return;}
  lb.disabled=true;lb.textContent="сохраняю…";
  // Режим проверки/редактирования: обновляем существующую кампанию, без создания новой.
  if(WZ.editId){
    try{
      const r=await api(`/api/campaign/${WZ.editId}/update`,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name:d.name,product:d.client,audience_tag:d.audience_tag,channel:d.channel,
          message_template:d.offer,agent_prompt:d.prompt,kp_text:d.kp_text||""})});
      if(r.error){msg.innerHTML='<span style="color:#c0392b">'+esc(r.error)+'</span>';lb.disabled=false;lb.textContent="💾 Сохранить изменения";return;}
      if(d.keywords.trim())await api("/api/niches",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:d.name,keywords:d.keywords})});
      wzClearDraft();
      msg.innerHTML=`<div class="card" style="background:var(--green-soft);padding:12px">✅ Кампания обновлена.<div style="margin-top:8px"><button class="primary" id="wz-done">К кампаниям →</button></div></div>`;
      const done=$("#wz-done");if(done)done.onclick=()=>{WZ=null;location.hash="campaigns";route();};
    }catch(e){msg.innerHTML='<span style="color:#c0392b">ошибка: '+esc(e.message)+'</span>';lb.disabled=false;lb.textContent="💾 Сохранить изменения";}
    return;
  }
  lb.textContent="запускаю…";
  try{
    let project_id=null;
    const pr=await api("/api/projects",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:d.name,entity:d.client,description:d.goal})});
    project_id=pr.id||null;
    const pl=await api("/api/pipelines",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:d.client||d.name,product:d.client||d.name,project_id})});
    const camp=await api("/api/campaigns",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      name:d.name,product:d.client,audience_tag:d.audience_tag,channel:d.channel,
      message_template:d.offer,agent_prompt:d.prompt,project_id})});
    if(camp.error){msg.innerHTML='<span style="color:#c0392b">'+esc(camp.error)+'</span>';lb.disabled=false;lb.textContent="💰 Запустить (клиенты на автомате)";return;}
    if(d.keywords.trim())await api("/api/niches",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:d.name,keywords:d.keywords})});
    let proxyNote="";
    const ap=document.getElementById("wz-autoproxy");
    if(ap&&ap.checked){await api("/api/proxies/auto",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({auto:true,interval_h:6})});proxyNote="<br>📡 Бесплатный авто-пул MTProto включён — прокси соберутся и раздадутся в фоне (минуту).";}
    msg.innerHTML=`<div class="card" style="background:var(--green-soft);padding:12px">✅ Создано: проект, воронка, кампания${d.keywords.trim()?", ниша для прослушки":""}.${proxyNote}<br>
      Дальше: открой кампанию → назначь аккаунты-отправители (команда) → жми ▶ «Запустить». Агенты начнут писать и вести к КЭВ.
      <div style="margin-top:8px"><button class="primary" id="wz-done">К кампаниям →</button></div></div>`;
    wzClearDraft();
    const done=$("#wz-done");if(done)done.onclick=()=>{WZ=null;location.hash="campaigns";route();};
  }catch(e){msg.innerHTML='<span style="color:#c0392b">ошибка: '+esc(e.message)+'</span>';lb.disabled=false;lb.textContent="💰 Запустить (клиенты на автомате)";}
}

// ----------------------------------------------------------------- notifications
let NOTIF=[];
function notifSeenTs(){return localStorage.getItem("axiom_notif_seen")||"";}
async function refreshNotif(){
  try{const r=await api("/api/notifications");NOTIF=r.items||[];}catch(e){NOTIF=[];}
  const seen=notifSeenTs();
  const unseen=NOTIF.filter(n=>(n.type==="msg"||n.type==="event")&&(n.ts||"")>seen).length;
  const b=$("#bell-badge");
  if(unseen>0){b.textContent=unseen>99?"99+":unseen;b.style.display="";}else b.style.display="none";
}
const EVENT_IC={campaign_start:"▶",campaign_done:"✅",lead:"🔥",meeting:"📅",ban:"⛔",warm_ready:"🌡",info:"ℹ️"};
function renderNotif(){
  const box=$("#notif");
  if(!NOTIF.length){box.innerHTML='<div class="empty" style="padding:24px">Пока пусто</div>';return;}
  box.innerHTML=NOTIF.map(n=>{
    if(n.type==="event"){
      const ic=EVENT_IC[n.event_type]||"•";
      const col=n.level==="warn"?"#c0392b":(n.level==="good"?"var(--green)":"var(--muted)");
      const nav=n.contact_id?`data-cid="${n.contact_id}"`:(n.campaign_id?`data-camp="${n.campaign_id}"`:"");
      return `<div class="ni" ${nav}>
        <span class="ic">${ic}</span>
        <div class="tx"><div class="who" style="color:${col}">${esc(n.title||"")}</div>
          ${n.text?`<div class="msg">${esc(n.text)}</div>`:""}</div>
        <span class="tm">${fmt(n.ts)}</span></div>`;
    }
    return `<div class="ni" data-cid="${n.contact_id}">
      <span class="ic">${n.type==="meeting"?"📅":"💬"}</span>
      <div class="tx"><div class="who">${esc(n.who||"—")}</div>
        <div class="msg">${n.type==="meeting"?"назначена встреча":esc(n.text)}</div></div>
      <span class="tm">${fmt(n.ts)}</span></div>`;}).join("");
  box.querySelectorAll(".ni").forEach(el=>el.onclick=()=>{$("#notif").style.display="none";
    if(el.dataset.cid)openDossier(+el.dataset.cid);
    else if(el.dataset.camp){location.hash="campaigns";}});
}
$("#bell").onclick=()=>{const box=$("#notif");const open=box.style.display==="none";
  if(open){renderNotif();box.style.display="block";
    if(NOTIF.length)localStorage.setItem("axiom_notif_seen",NOTIF.reduce((a,n)=>n.ts>a?n.ts:a,""));
    $("#bell-badge").style.display="none";
  }else box.style.display="none";};
document.addEventListener("click",e=>{if(!e.target.closest(".bellwrap"))$("#notif").style.display="none";});

async function route(){
  const id=(location.hash||"#dashboard").slice(1);
  const nav=NAV.find(n=>n.id===id)||NAV[0];
  renderNav(nav.id);$("#title").textContent=nav.label;
  const v=$("#view");v.innerHTML='<div class="sub">Загрузка…</div>';
  try{await (VIEWS[nav.id]||viewDashboard)(v);}catch(e){v.innerHTML=`<div class="empty">Ошибка: ${esc(e.message)}</div>`;}
  $("#upd").textContent="обновлено "+new Date().toLocaleTimeString("ru-RU");
  refreshNotif();
}
window.addEventListener("hashchange",route);
$("#refresh").onclick=route;
route();
setInterval(refreshNotif,60000);
</script>
